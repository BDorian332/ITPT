name: Multi-OS Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        shell: bash
        run: pip install poetry

      - name: Install dependencies
        shell: bash
        run: poetry install --without dev --with gui

      - name: Build app
        shell: bash
        run: |
          poetry run itpt-build --lib
          for gui_ver in vtk vctk; do
            poetry run itpt-build --gui $gui_ver
          done

      - name: Prepare final assets
        shell: bash
        run: |
          ls -l dist
          mkdir -p final_assets

          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            cp dist/*.whl final_assets/
            cp dist/*.tar.gz final_assets/
          fi

          for gui_ver in vtk vctk; do
            if [[ "${RUNNER_OS}" == "Linux" ]]; then
              cp dist/gui-${gui_ver} final_assets/gui-${gui_ver}-Linux
            elif [[ "${RUNNER_OS}" == "macOS" ]]; then
              cd dist
              if [[ -d gui-${gui_ver}.app ]]; then
                zip -r ../final_assets/gui-${gui_ver}-macOS.app.zip gui-${gui_ver}.app
              fi
              if [[ -d gui-${gui_ver} ]]; then
                zip -r ../final_assets/gui-${gui_ver}-macOS.zip gui-${gui_ver}
              fi
              cd ..
            elif [[ "${RUNNER_OS}" == "Windows" ]]; then
              cp dist/gui-${gui_ver}.exe final_assets/gui-${gui_ver}-Windows.exe
            fi
          done

          ls -l final_assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: final_assets/*
          body_path: RELEASE.md
          append_body: false
          prerelease: true
