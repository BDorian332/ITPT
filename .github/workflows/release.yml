name: Multi-OS Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --without dev --with gui

      - name: Build app
        run: |
          poetry run itpt-build --lib
          poetry run itpt-build --gui

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          if [[ "${RUNNER_OS}" == "Linux" ]]; then
              cp dist/gui-Linux artifacts/gui-Linux
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
              cp -r dist/gui.app artifacts/gui-macOS
          elif [[ "${RUNNER_OS}" == "Windows" ]]; then
              cp dist/gui.exe artifacts/gui-Windows.exe
          fi

          cp dist/itpt-0-py3-none-any.whl artifacts/itpt-0-py3-none-any.whl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: artifacts/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: collected/**/*
          body_path: RELEASE.md
