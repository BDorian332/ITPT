name: Multi-OS Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --without dev --with gui

      - name: Build app
        run: |
          poetry run itpt-build --lib
          for gui_ver in v1 v2; do
            poetry run itpt-build --gui $gui_ver
          done

      - name: Prepare artifacts
        shell: bash
        run: |
          ls -l dist
          mkdir -p artifacts

          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            cp dist/*.whl artifacts/
          fi

          for gui_ver in v1 v2; do
            if [[ "${RUNNER_OS}" == "Linux" ]]; then
              cp dist/gui-${gui_ver} artifacts/gui-${gui_ver}-Linux
            elif [[ "${RUNNER_OS}" == "macOS" ]]; then
              if [[ -d dist/gui-${gui_ver}.app ]]; then
                # If --windowed
                zip -r artifacts/gui-${gui_ver}-macOS.zip dist/gui-${gui_ver}.app
              else
                cp dist/gui-${gui_ver} artifacts/gui-${gui_ver}-macOS
              fi
            elif [[ "${RUNNER_OS}" == "Windows" ]]; then
              cp dist/gui-${gui_ver}.exe artifacts/gui-${gui_ver}-Windows.exe
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: artifacts/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: collected/**/*
          body_path: RELEASE.md
